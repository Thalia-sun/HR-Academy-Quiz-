<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia de RRHH - Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#C9A84C;
  --dark:#0F0F0F;
  --dark-2:#1A1A1A;
  --dark-3:#242424;
  --cream:#F5F0E8;
  --cream-dim:#D4CFC7;
  --green:#4CAF7A;
  --red:#E05252;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:DM Sans,sans-serif;
  background:var(--dark);
  color:var(--cream);
}

.app{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.screen{display:none}
.screen.active{display:block}

h1{
  font-family:Playfair Display,serif;
  text-align:center;
  color:var(--gold);
  font-size:40px;
  margin-bottom:10px;
}

p{
  text-align:center;
  color:var(--cream-dim);
  margin-bottom:30px;
}

.card{
  background:var(--dark-2);
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2a;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.option{
  background:var(--dark-3);
  color:var(--cream);
}

.option:hover{
  background:var(--dark-2);
}

.correct{
  background:var(--green)!important;
  color:white;
}

.wrong{
  background:var(--red)!important;
  color:white;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.small-btn{
  width:auto;
  padding:10px 15px;
  background:var(--gold);
  color:black;
}
</style>
</head>

<body>

<div class="app">

<!-- INICIO -->
<div id="home" class="screen active">
<h1>Academia RRHH</h1>
<p>Aprende recursos humanos paso a paso</p>

<div class="card">
<button onclick="startQuiz()">Empezar quiz</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div class="card">
<h2 id="question"></h2>
<div id="answers"></div>

<div class="nav">
<button class="small-btn" onclick="next()">Siguiente</button>
</div>
</div>
</div>

</div>

<script>
const preguntas = [
{
q:"¿Qué es la gestión estratégica de RRHH?",
a:["Solo nóminas","Parte de la estrategia empresarial","Solo contratación"],
c:1
},
{
q:"¿Qué es el reclutamiento?",
a:["Encontrar empleados","Gestionar vacaciones","Contabilidad"],
c:0
}
];

let i = 0;
let score = 0;
let locked = false;

function startQuiz(){
i = 0;
score = 0;
show("quiz");
load();
}

function load(){
locked = false;
let q = preguntas[i];

document.getElementById("question").innerText = q.q;

let html = "";

q.a.forEach((op, idx)=>{
html += `<button class="option" onclick="select(${idx})">${op}</button>`;
});

document.getElementById("answers").innerHTML = html;
}

function select(idx){
if(locked) return;
locked = true;

let q = preguntas[i];
let buttons = document.querySelectorAll(".option");

buttons.forEach((b, bi)=>{
if(bi === q.c) b.classList.add("correct");
if(bi === idx && idx !== q.c) b.classList.add("wrong");
});

if(idx === q.c) score++;
}

function next(){
i++;
if(i >= preguntas.length){
alert("Fin del quiz. Puntuación: " + score);
show("home");
}else{
load();
}
}

function show(id){
document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
