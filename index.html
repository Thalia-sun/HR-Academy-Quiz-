<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia de RRHH – Quiz de Dirección Estratégica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --navy: #0D1B2A;
    --navy-mid: #1A2E45;
    --navy-light: #243B55;
    --silver: #B0BEC5;
    --bronze: #CD7F32;
    --cream: #F5F0E8;
    --green: #2ECC71;
    --red: #E74C3C;
    --white: #FFFFFF;
  }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'DM Sans', sans-serif;
background: var(--navy);
color: var(--cream);
min-height: 100vh;
overflow-x: hidden;
}

/* Fondo animado */
body::before {
content: '';
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(36,59,85,0.6) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(13,27,42,1) 0%, transparent 100%);
z-index: 0;
pointer-events: none;
}

.container {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 20px;
}

/* Pantallas */
.screen { display: none; }
.screen.active { display: block; }

/* CABECERA */
.header {
text-align: center;
padding: 40px 0 30px;
}
.header .badge-icon {
font-size: 56px;
display: block;
margin-bottom: 12px;
animation: float 3s ease-in-out infinite;
}
@keyframes float {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-8px); }
}
.header h1 {
font-family: 'Playfair Display', serif;
font-size: clamp(28px,5vw,46px);
font-weight: 900;
background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
letter-spacing: -0.5px;
line-height: 1.1;
}
.header p {
color: var(--silver);
font-size: 15px;
margin-top: 10px;
font-weight: 300;
letter-spacing: 0.5px;
}

/* Escalera de rango */
.rank-ladder {
display: flex;
justify-content: center;
gap: 6px;
margin: 28px 0;
flex-wrap: wrap;
}
.rank-step {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
opacity: 0.3;
transition: all 0.4s;
}
.rank-step.unlocked { opacity: 1; }
.rank-step.current { opacity: 1; transform: scale(1.1); }
.rank-step .icon { font-size: 22px; }
.rank-step .label {
font-size: 9px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(--silver);
}
.rank-step.current .label { color: var(--gold); }
.rank-connector {
width: 20px;
height: 2px;
background: var(--navy-light);
margin-top: 18px;
align-self: flex-start;
}
.rank-connector.filled { background: var(--gold); }

/* Tarjetas de nivel */
.level-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap: 16px;
margin-top: 16px;
}
.level-card {
background: var(--navy-mid);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 16px;
padding: 28px 24px;
cursor: pointer;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.level-card:hover {
transform: translateY(-4px);
border-color: var(--gold);
box-shadow: 0 12px 40px rgba(201,168,76,0.15);
}
.level-card.locked { opacity: 0.45; cursor: not-allowed; }

.level-emoji { font-size: 36px; margin-bottom: 12px; }

.level-name {
font-family: 'Playfair Display', serif;
font-size: 20px;
font-weight: 700;
color: var(--cream);
margin-bottom: 6px;
}

.level-desc {
font-size: 13px;
color: var(--silver);
line-height: 1.5;
}

/* Quiz */
.quiz-title {
font-family: 'Playfair Display', serif;
font-size: 22px;
color: var(--gold);
}

.question-text {
font-size: 18px;
font-weight: 500;
line-height: 1.55;
}

.answer-btn {
background: var(--navy-mid);
border: 1.5px solid rgba(176,190,197,0.2);
border-radius: 14px;
padding: 18px 22px;
text-align: left;
cursor: pointer;
color: var(--cream);
transition: all 0.25s;
}

.answer-btn.correct { border-color: var(--green); }
.answer-btn.wrong { border-color: var(--red); }

/* Resultado */
.result-title {
font-family: 'Playfair Display', serif;
font-size: 32px;
color: var(--gold);
text-align: center;
}

.result-rank { text-align: center; color: var(--silver); }

.btn {
padding: 14px 28px;
border-radius: 12px;
border: none;
cursor: pointer;
font-weight: 600;
}

.btn-primary {
background: linear-gradient(135deg, var(--gold), var(--gold-dark));
color: var(--navy);
}

.btn-secondary {
background: transparent;
border: 1px solid var(--silver);
color: var(--silver);
}
</style>
</head>

<body>

<div class="container">

  <!-- PANTALLA INICIO -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <span class="badge-icon">🏛️</span>
      <h1>Academia de RRHH</h1>
      <p>Módulo 1 · Dirección Estratégica de Recursos Humanos</p>
    </div>

    <div class="rank-ladder" id="rank-ladder"></div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <button class="back-btn" onclick="goHome()">← Volver</button>

    <div class="quiz-header">
      <span class="quiz-title" id="quiz-level-title"></span>
      <div class="quiz-meta">
        <div class="pill">Pregunta <span id="q-current">1</span>/<span id="q-total">10</span></div>
        <div class="pill">⭐ <span id="q-score">0</span></div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="question-card">
      <div class="question-text" id="q-text"></div>
    </div>

    <div class="answers" id="answers-container"></div>
    <div class="explanation" id="explanation"></div>

    <div class="nav-btns">
      <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>

  <!-- RESULTADO -->
  <div class="screen" id="screen-result">
    <div class="result-screen">
      <span class="medal-display" id="result-medal">🥇</span>
      <h2 class="result-title" id="result-title">¡Excelente!</h2>
      <p class="result-rank" id="result-rank"></p>

      <div class="score-ring">
        <div class="score-number" id="score-number">0<small>/10</small></div>
      </div>

      <div class="stats-row">
        <div>Correctas: <span id="stat-correct">0</span></div>
        <div>Incorrectas: <span id="stat-wrong">0</span></div>
        <div>Porcentaje: <span id="stat-pct">0%</span></div>
      </div>

      <div class="result-btns">
        <button class="btn btn-secondary" onclick="retryLevel()">Reintentar</button>
        <button class="btn btn-primary" onclick="goHome()">Inicio</button>
      </div>
    </div>
  </div>

</div>

<script>
// TEXTO DEL QUIZ TRADUCIDO
const LEVELS = [
  {
    name: 'Fundamentos',
    desc: 'Introducción a la dirección estratégica de RRHH.',
    questions: [
      {
        q: '¿Qué es la Dirección Estratégica de RRHH?',
        a: [
          'Un enfoque administrativo',
          'Integrar RRHH en la estrategia empresarial',
          'Solo gestión de nóminas',
          'Una consultoría externa'
        ],
        correct: 1,
        exp: 'RRHH forma parte de la estrategia de la empresa.'
      }
    ]
  }
];
</script>

</body>
</html>
