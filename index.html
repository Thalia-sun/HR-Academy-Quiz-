<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Quiz Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#C9A84C;
  --gold-light:#E8C96A;
  --dark:#0F0F0F;
  --dark-2:#1A1A1A;
  --dark-3:#242424;
  --dark-4:#2E2E2E;
  --cream:#F5F0E8;
  --cream-dim:#D4CFC7;
  --green:#4CAF7A;
  --red:#E05252;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:DM Sans,sans-serif;
  background:var(--dark);
  color:var(--cream);
}

.app{max-width:900px;margin:auto;padding:30px}

.screen{display:none}
.screen.active{display:block}

h1{
  font-family:Playfair Display,serif;
  font-size:42px;
  text-align:center;
  margin-bottom:10px;
  color:var(--gold);
}

p{text-align:center;color:var(--cream-dim);margin-bottom:30px}

.card{
  background:var(--dark-2);
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #2a2a2a;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.option{
  background:var(--dark-3);
  color:var(--cream);
}

.option:hover{
  background:var(--dark-4);
}

.correct{background:var(--green)!important;color:#fff}
.wrong{background:var(--red)!important;color:#fff}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.small-btn{
  width:auto;
  padding:10px 15px;
  background:var(--gold);
  color:#000;
}
</style>
</head>

<body>

<div class="app">

<div id="home" class="screen active">
<h1>HR Quiz Academy</h1>
<p>Lerne HR Strategien Schritt für Schritt</p>

<div class="card">
<button onclick="startQuiz()">Quiz starten</button>
</div>
</div>

<div id="quiz" class="screen">
<div class="card">
<h2 id="question"></h2>
<div id="answers"></div>

<div class="nav">
<button class="small-btn" onclick="next()">Weiter</button>
</div>
</div>
</div>

</div>

<script>
const questions=[
{
q:"Was ist strategisches HR?",
a:["Nur Gehalt","Teil der Unternehmensstrategie","Nur Verwaltung"],
c:1
},
{
q:"Was ist Recruiting?",
a:["Mitarbeiter finden","Urlaub planen","Buchhaltung"],
c:0
}
];

let i=0;
let score=0;
let locked=false;

function startQuiz(){
i=0;
score=0;
show("quiz");
load();
}

function load(){
locked=false;
let q=questions[i];
document.getElementById("question").innerText=q.q;

let html="";
q.a.forEach((x,idx)=>{
html+=`<button class="option" onclick="select(${idx})">${x}</button>`;
});
document.getElementById("answers").innerHTML=html;
}

function select(idx){
if(locked)return;
locked=true;

let q=questions[i];
let btns=document.querySelectorAll(".option");

btns.forEach((b,bi)=>{
if(bi===q.c)b.classList.add("correct");
if(bi===idx&&idx!==q.c)b.classList.add("wrong");
});

if(idx===q.c)score++;
}

function next(){
i++;
if(i>=questions.length){
alert("Fertig! Score: "+score);
show("home");
}else{
load();
}
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
